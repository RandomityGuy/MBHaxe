name: MBHaxe-iOS
options:
  bundleIdPrefix: com.randomityguy
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  configs:
    Debug:
      GCC_OPTIMIZATION_LEVEL: 0
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
targets:
  MBHaxe-iOS:
    type: application
    platform: iOS
    deploymentTarget: "13.0"
    sources:
      - path: MBHaxeIOS
        excludes:
          - Info.plist
      - path: ./native/marblegame.c
      - path: MBHaxeIOS/cacert.pem
        buildPhase: resources
      - path: ../data
        type: folder
        buildPhase: resources
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    info:
      path: MBHaxeIOS/Info.plist
      properties:
        CFBundleShortVersionString: "1.1.13"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # --- Networking ---
        # The master server has a plain ws:// (and other non-TLS) fallback that
        # App Transport Security blocks by default; allow arbitrary loads so the
        # websocket + WebRTC transports all connect.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_NAME: Marble Blast Gold
        PRODUCT_BUNDLE_IDENTIFIER: com.randomityguy.mbghaxe
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        CLANG_ENABLE_OBJC_ARC: YES
    postBuildScripts:
      - name: Copy MBHaxe Data
        basedOnDependencyAnalysis: false
        script: |
          set -e

          SRC="$SRCROOT/../data"
          DST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/data"

          echo "Copying MBHaxe data:"
          echo "$SRC -> $DST"

          if [ ! -d "$SRC" ]; then
            echo "Missing source data folder: $SRC"
            exit 1
          fi

          rm -rf "$DST"
          ditto "$SRC" "$DST"

          echo "Checking required font:"
          ls "$DST/font/DomCasualD.fnt"
    dependencies:
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreMotion.framework
      - sdk: Foundation.framework
      - sdk: GameController.framework
      - sdk: Metal.framework
      - sdk: OpenGLES.framework
      - sdk: QuartzCore.framework
      - sdk: UIKit.framework
